name: Android CI

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '🔨 Build Type — Debug (artifacts, 2 days) or Release (tag + GitHub Release)'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for tagging and creating GitHub Releases

    steps:
      # ─── Determine build type ────────────────────────────────────────────────
      - name: Determine build type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BUILD_TYPE=${{ github.event.inputs.build_type }}" >> $GITHUB_ENV
          else
            echo "BUILD_TYPE=Debug" >> $GITHUB_ENV
          fi

      # ─── Setup ───────────────────────────────────────────────────────────────
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # Full history needed for tagging

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─── Version bump (Release only) ─────────────────────────────────────────
      - name: Read current version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | cut -d '"' -f 2)
          echo "CURRENT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Bump patch version for Release
        if: env.BUILD_TYPE == 'Release'
        run: |
          CURRENT="${{ env.CURRENT_VERSION }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

          # Update versionName in build.gradle.kts
          sed -i "s/versionName = \"$CURRENT\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts

          # Update versionCode (increment by 1)
          CURRENT_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -oE '[0-9]+')
          NEW_CODE=$((CURRENT_CODE + 1))
          sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts

          echo "Bumped: $CURRENT → $NEW_VERSION (versionCode: $CURRENT_CODE → $NEW_CODE)"

      # ─── Build ───────────────────────────────────────────────────────────────
      - name: Build Debug APK
        if: env.BUILD_TYPE == 'Debug'
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: env.BUILD_TYPE == 'Release'
        run: ./gradlew assembleRelease

      # ─── Meta ────────────────────────────────────────────────────────────────
      - name: Get Short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Get final version
        run: |
          echo "VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | cut -d '"' -f 2)" >> $GITHUB_ENV

      - name: List assets
        run: ls -la app/src/main/assets

      # ─── Debug: Upload artifact (auto-deleted after 2 days) ──────────────────

      - name: Rename Debug APK
        if: env.BUILD_TYPE == 'Debug'
        run: |
          cp ./app/build/outputs/apk/debug/app-debug.apk \
             ./Winlator-Bionic-Debug-${{ env.VERSION }}-${{ env.SHORT_SHA }}.apk

      - name: Upload Debug APK as artifact
        if: env.BUILD_TYPE == 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: Winlator-Bionic-Debug-${{ env.VERSION }}-${{ env.SHORT_SHA }}   # ← ไม่มี .apk ตรงนี้
          path: ./Winlator-Bionic-Debug-${{ env.VERSION }}-${{ env.SHORT_SHA }}.apk
          retention-days: 2

      # ─── Release: Commit bump → Tag → GitHub Release (direct .apk download) ──
      - name: Commit version bump
        if: env.BUILD_TYPE == 'Release'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }}"
          git push

      - name: Create and push tag
        if: env.BUILD_TYPE == 'Release'
        run: |
          git tag "v${{ env.NEW_VERSION }}"
          git push origin "v${{ env.NEW_VERSION }}"

      - name: Create GitHub Release with APK
        if: env.BUILD_TYPE == 'Release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: "Winlator Bionic v${{ env.NEW_VERSION }}"
          body: |
            ## Winlator Bionic v${{ env.NEW_VERSION }}
            **Commit:** `${{ env.SHORT_SHA }}`
          files: ./app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}